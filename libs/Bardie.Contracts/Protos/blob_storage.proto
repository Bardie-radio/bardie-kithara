syntax = "proto3";

package bardie.storage.v1;

option csharp_namespace = "Bardie.Storage.V1";

// BlobStorage — modules dial Kithara (mTLS) for library blob put/get.
// v0.1 draft: RPC set and dial rules are frozen; see docs/architecture/interfaces/grpc-blob-storage.md
//
// Key layout under the driver root: tunes/<source_slug>/…
// Example: tunes/magpie/<object-id>
// Keys are opaque to callers; only the active driver maps key → path/object.
// Put may omit key — Kithara assigns under tunes/<source_slug>/… using mTLS module identity.

service BlobStorage {
  rpc Put(stream PutBlobRequest) returns (PutBlobResponse);
  rpc Get(GetBlobRequest) returns (stream GetBlobResponse);
  rpc Exists(ExistsBlobRequest) returns (ExistsBlobResponse);
  rpc Delete(DeleteBlobRequest) returns (DeleteBlobResponse);
}

message PutBlobHeader {
  // Empty → Kithara assigns under tunes/<source_slug>/…
  string key = 1;
  string content_type = 2;
}

// First message MUST be header; subsequent messages are data chunks.
message PutBlobRequest {
  oneof payload {
    PutBlobHeader header = 1;
    bytes chunk = 2;
  }
}

message PutBlobResponse {
  string key = 1;
  int64 size_bytes = 2;
}

message GetBlobRequest {
  string key = 1;
}

message GetBlobResponse {
  // First message may carry content_type with empty/zero chunk; then data chunks.
  string content_type = 1;
  bytes chunk = 2;
}

message ExistsBlobRequest {
  string key = 1;
}

message ExistsBlobResponse {
  bool exists = 1;
}

message DeleteBlobRequest {
  string key = 1;
}

message DeleteBlobResponse {
  bool deleted = 1;
}
