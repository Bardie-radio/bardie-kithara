syntax = "proto3";

package bardie.auth.v1;

option csharp_namespace = "Bardie.Auth.V1";

// AuthAdapter — Kithara dials registered auth modules for work RPCs.
// v0.1 draft: RPC set and dial rules are frozen; see docs/architecture/interfaces/grpc-auth-adapter.md
// Join is via ModuleRegistry — Register is not on this service.
// User + binding persistence goes through Kithara — adapters do not open a DB.

service AuthAdapter {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc GetProviders(GetProvidersRequest) returns (GetProvidersResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc SeedAdmin(SeedAdminRequest) returns (SeedAdminResponse);
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
}

message GetProvidersRequest {}

message GetProvidersResponse {
  repeated ProviderDescriptor providers = 1;
}

message ProviderDescriptor {
  // Opaque routing handle for Authenticate/Refresh. Clients must NOT branch UI on this
  // (no if id == "bes"). Presentation is entirely in `ui` below.
  string id = 1;
  string display_name = 2;
  // Self-describing UI: clients switch on the oneof case only.
  oneof ui {
    FormSchemaUi form_schema = 10;
    RedirectUi redirect = 11;
    // CeremonyUi (WebAuthn / passkeys) reserved for later — still not module-name branching.
  }
}

message FormSchemaUi {
  repeated FormField fields = 1;
}

message FormField {
  // Key written into AuthenticateRequest.payload.
  string name = 1;
  string label = 2;
  // text | password | email | …
  string input_type = 3;
  bool required = 4;
}

message RedirectUi {
  // Browser navigates here; return hits Kithara callback, not the adapter.
  string authorize_url = 1;
}

message AuthenticateRequest {
  string provider_id = 1;
  // Credentials, callback params, ceremony data, …
  map<string, string> payload = 2;
  // Kithara-loaded binding for this subject (empty = no prior binding).
  bytes existing_binding_payload = 3;
}

message AuthenticateResponse {
  bool allowed = 1;
  string external_subject = 2;
  repeated string roles = 3;
  map<string, string> entities = 4;
  bytes binding_payload = 5;
  bool ensure_user = 6;
  // JWT — minted by module or forwarded (e.g. OIDC).
  string access_token = 7;
  // Opaque to Kithara; module owns refresh semantics.
  string refresh_token = 8;
  string token_type = 9;
  int64 expires_in = 10;
  bool must_rotate_credentials = 11;
}

message RefreshRequest {
  string provider_id = 1;
  string refresh_token = 2;
}

message RefreshResponse {
  bool allowed = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_in = 4;
  string token_type = 5;
}

message SeedAdminRequest {
  // Optional operator/correlation hint (not secrets).
  string correlation_id = 1;
}

message SeedAdminResponse {
  bool created = 1;
  // Includes one-time credentials; Kithara logs only — never expose on public HTTP.
  string welcome_log_text = 2;
  string external_subject = 3;
  bytes binding_payload = 4;
  bool ensure_user = 5;
  bool must_rotate_credentials = 6;
  repeated string roles = 7;
  map<string, string> entities = 8;
}
