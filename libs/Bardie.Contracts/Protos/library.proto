syntax = "proto3";

package bardie.library.v1;

option csharp_namespace = "Bardie.Library.V1";

// Library — modules dial Kithara (mTLS) to upsert shared-library Tunes.
// v0.1 draft: RPC set and dial rules are frozen; see docs/architecture/interfaces/grpc-library.md
// Kithara owns EF persistence. Upsert key: module_slug + external_id.

service Library {
  rpc EnsureTune(EnsureTuneRequest) returns (EnsureTuneResponse);
}

message EnsureTuneRequest {
  string module_slug = 1;
  string external_id = 2;
  string title = 3;
  string artist = 4;
  // 0 / unset = unknown.
  double duration_seconds = 5;
  string artwork_url = 6;
  // Opaque blob key when bytes exist (e.g. after BlobStorage.Put).
  string storage_key = 7;
  string content_type = 8;
  int64 size_bytes = 9;
}

message EnsureTuneResponse {
  // GUID string of the Tune row.
  string tune_id = 1;
  bool created = 2;
}
