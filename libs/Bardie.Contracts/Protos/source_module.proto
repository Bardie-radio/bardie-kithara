syntax = "proto3";

package bardie.source.v1;

option csharp_namespace = "Bardie.Source.V1";

// SourceModule — Kithara dials registered source modules for work RPCs.
// v0.1 draft: RPC set and dial rules are frozen; see docs/architecture/interfaces/grpc-source-module.md
// Join is via ModuleRegistry — Register is not on this service.

service SourceModule {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc StartTrack(StartTrackRequest) returns (StartTrackResponse);
  rpc StopTrack(StopTrackRequest) returns (StopTrackResponse);
  rpc PauseTrack(PauseTrackRequest) returns (PauseTrackResponse);
  rpc ResumeTrack(ResumeTrackRequest) returns (ResumeTrackResponse);
  rpc TrackStatus(TrackStatusRequest) returns (stream TrackStatusEvent);
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
}

// Quicksearch ≈ fields with only "title" set to the plain-text query.
// Regular search uses the module's advertised search field schema (title mandatory).
message SearchRequest {
  map<string, string> fields = 1;
  // Soft hint; modules may clamp. 0 = module default.
  int32 limit = 2;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SearchResult {
  // Module-native ref for StartTrack (URL, video id, internal id, …).
  string track_ref = 1;
  string title = 2;
  string artist = 3;
  // Stable external id when known (e.g. YouTube video id) — used with EnsureTune.
  string external_id = 4;
  map<string, string> metadata = 5;
}

message StartTrackRequest {
  string struna_id = 1;
  // Module-specific (URL, tune id, YouTube link, stream URI, …).
  string track_ref = 2;
  // Kithara-owned session path on the shared audio volume (FIFO / socket).
  string audio_endpoint = 3;
}

message StartTrackResponse {
  string track_job_id = 1;
}

message StopTrackRequest {
  string track_job_id = 1;
}

message StopTrackResponse {
  bool ok = 1;
}

message PauseTrackRequest {
  string track_job_id = 1;
}

message PauseTrackResponse {
  bool ok = 1;
}

message ResumeTrackRequest {
  string track_job_id = 1;
}

message ResumeTrackResponse {
  bool ok = 1;
}

message TrackStatusRequest {
  string track_job_id = 1;
}

enum TrackState {
  TRACK_STATE_UNSPECIFIED = 0;
  TRACK_STATE_RUNNING = 1;
  TRACK_STATE_PAUSED = 2;
  TRACK_STATE_ENDED = 3;
  TRACK_STATE_ERROR = 4;
}

message TrackStatusEvent {
  string track_job_id = 1;
  TrackState state = 2;
  string title = 3;
  string artist = 4;
  // Present when state == TRACK_STATE_ERROR.
  string error_message = 5;
}
