syntax = "proto3";

package bardie.modules.v1;

option csharp_namespace = "Bardie.Modules.V1";

// ModuleRegistry — modules dial the host to join the mesh.
// v0.1 draft: RPC set and dial rules are frozen; see docs/architecture/interfaces/grpc-module-registry.md
//
// `kind` is an open string (not a closed enum). Hosts interpret well-known values;
// unknown kinds still Register + Heartbeat via ModuleChannel mTLS.

service ModuleRegistry {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message RegisterRequest {
  // Lowercase codename; operator may override via env when community slugs collide.
  string slug = 1;
  // Bootstrap trust before mTLS cert exists. Not used on Heartbeat.
  string join_secret = 2;
  // Open module kind (e.g. "source", "auth", "client", or a host-defined value).
  string kind = 3;
  // e.g. search, play, pause, seedAdmin
  repeated string capabilities = 4;
  // Where the host dials this module for per-call work RPCs.
  string grpc_advertise_address = 5;
  // Optional typed payloads for well-known kinds. Unknown kinds leave this unset
  // (or ignore host-unknown branches). Field numbers reserved for Bardie-shaped details.
  oneof details {
    SourceRegisterDetails source = 10;
    AuthRegisterDetails auth = 11;
    ClientRegisterDetails client = 12;
  }
}

message SourceRegisterDetails {
  repeated SearchFieldDescriptor search_fields = 1;
}

message SearchFieldDescriptor {
  // title (mandatory for searchable modules), artist, owner, …
  string name = 1;
  bool required = 2;
}

message AuthRegisterDetails {
  // URL the host fetches for login-JWT verify.
  string jwks_uri = 1;
  // Optional inline JWKS snapshot at Register.
  string jwks_json = 2;
}

message ClientRegisterDetails {
  // "user-aware" | "static"
  string auth_mode = 1;
  // Static modules only: max rights for managed users.
  repeated string permission_ceiling = 2;
}

message RegisterResponse {
  // Populated in bootstrap mode `auto` (private mesh). Empty in `preshared`.
  string client_certificate_pem = 1;
  string client_private_key_pem = 2;
  string ca_certificate_pem = 3;
  // Non-secret metadata (safe in both modes).
  string ca_thumbprint = 4;
  int64 certificate_expires_unix = 5;
}

// Identity after Register is the mTLS client certificate — no join_secret.
message HeartbeatRequest {
  string slug = 1;
}

message HeartbeatResponse {
  bool ok = 1;
  int64 next_heartbeat_after_seconds = 2;
}
